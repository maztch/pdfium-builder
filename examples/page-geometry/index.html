<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDFium WASM Page Geometry</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #667085;
        --line: #d8deea;
        --panel: rgba(255, 255, 255, 0.86);
        --accent: #6d28d9;
        --ok: #047857;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; color: var(--ink); font-family: ui-serif, Georgia, "Times New Roman", serif; background: radial-gradient(circle at 12% 8%, rgba(109, 40, 217, 0.16), transparent 30rem), radial-gradient(circle at 90% 18%, rgba(4, 120, 87, 0.14), transparent 26rem), linear-gradient(135deg, #f5f3ff 0%, #ecfdf5 100%); }
      .shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
      header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--line); background: rgba(255, 255, 255, 0.78); backdrop-filter: blur(12px); }
      h1, h2 { margin: 0; letter-spacing: -0.03em; }
      h1 { font-size: clamp(1.25rem, 2vw, 1.9rem); }
      h2 { margin-bottom: 0.75rem; font-size: 1rem; }
      .status { min-height: 1.5rem; margin-top: 0.35rem; color: var(--muted); font: 0.9rem ui-sans-serif, system-ui, sans-serif; }
      .status.error { color: var(--danger); }
      .controls, .button-row, .check-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }
      .controls { justify-content: flex-end; }
      input, select, button { font: 0.88rem ui-sans-serif, system-ui, sans-serif; }
      input[type="file"] { max-width: 16rem; }
      input[type="number"], select { width: 100%; border: 1px solid var(--line); border-radius: 0.65rem; padding: 0.55rem 0.65rem; color: var(--ink); background: white; }
      label { display: grid; gap: 0.25rem; color: var(--muted); font: 0.82rem ui-sans-serif, system-ui, sans-serif; }
      .check-row label { display: flex; align-items: center; gap: 0.35rem; }
      button { border: 1px solid var(--line); border-radius: 999px; padding: 0.55rem 0.8rem; color: var(--ink); background: white; font-weight: 700; cursor: pointer; }
      button.primary { border-color: var(--accent); color: white; background: var(--accent); }
      button.save { border-color: var(--ok); color: white; background: var(--ok); }
      button:hover:not(:disabled) { border-color: var(--accent); }
      button:disabled { cursor: not-allowed; opacity: 0.45; }
      main { display: grid; grid-template-columns: minmax(23rem, 31rem) minmax(0, 1fr); min-height: 0; }
      aside { min-height: 0; overflow: auto; padding: 1rem; border-right: 1px solid var(--line); background: var(--panel); }
      .panel { margin-bottom: 1rem; padding: 1rem; border: 1px solid var(--line); border-radius: 1rem; background: rgba(255, 255, 255, 0.82); box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08); }
      .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.65rem; }
      .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.5rem; }
      .metric, .box-row { display: grid; grid-template-columns: minmax(6rem, 0.8fr) minmax(0, 1.6fr); gap: 0.75rem; padding: 0.45rem 0; border-bottom: 1px solid var(--line); font: 0.86rem ui-sans-serif, system-ui, sans-serif; }
      .metric:last-child, .box-row:last-child { border-bottom: 0; }
      .metric span:first-child, .box-row span:first-child { color: var(--muted); }
      code { overflow-wrap: anywhere; font: 0.78rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .viewer { min-width: 0; min-height: 0; overflow: auto; padding: 2rem; }
      .canvas-frame { display: grid; place-items: start center; min-height: 100%; }
      .page-stack { position: relative; display: inline-block; }
      canvas { display: block; max-width: none; border: 1px solid #cbd5e1; border-radius: 0.4rem; background: white; box-shadow: 0 24px 70px rgba(23, 32, 51, 0.22); }
      .overlay { position: absolute; inset: 0; pointer-events: none; }
      .box-rect { position: absolute; border: 2px solid var(--box-color); background: color-mix(in srgb, var(--box-color) 14%, transparent); border-radius: 0.18rem; }
      .box-rect.selected { border-width: 3px; background: color-mix(in srgb, var(--box-color) 24%, transparent); box-shadow: 0 0 0 2px rgba(23, 32, 51, 0.12); }
      .empty { max-width: 38rem; margin: 8vh auto; padding: 2rem; border: 1px dashed var(--line); border-radius: 1rem; text-align: center; background: rgba(255, 255, 255, 0.72); }
      @media (max-width: 980px) { header { flex-direction: column; } .controls { justify-content: flex-start; } main { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid var(--line); } }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>PDFium WASM Page Geometry</h1>
          <div class="status" id="status">Load a PDF to inspect and edit page boxes and page size.</div>
        </div>
        <div class="controls">
          <input id="pdfInput" type="file" accept="application/pdf,.pdf">
          <button id="prevButton" type="button" disabled>Previous</button>
          <button id="nextButton" type="button" disabled>Next</button>
          <button id="zoomOutButton" type="button" disabled>Zoom out</button>
          <button id="zoomResetButton" type="button" disabled>100%</button>
          <button id="zoomInButton" type="button" disabled>Zoom in</button>
          <button id="saveButton" class="save" type="button" disabled>Save PDF</button>
        </div>
      </header>

      <main>
        <aside>
          <section class="panel">
            <h2>Document</h2>
            <div class="metric"><span>File</span><strong id="fileName">None</strong></div>
            <div class="metric"><span>Page</span><strong id="pageInfo">-</strong></div>
            <div class="metric"><span>Page size</span><strong id="pageSize">-</strong></div>
            <div class="metric"><span>Zoom</span><strong id="zoomInfo">100%</strong></div>
          </section>

          <section class="panel">
            <h2>Box Overlay</h2>
            <label>Selected box
              <select id="boxSelect"></select>
            </label>
            <div class="check-row" style="margin-top: 0.75rem;">
              <label><input id="showAllBoxes" type="checkbox" checked> Show all boxes</label>
            </div>
            <div id="boxList" style="margin-top: 0.75rem;"></div>
          </section>

          <section class="panel">
            <h2>Edit Selected Box</h2>
            <div class="grid-4">
              <label>Left <input id="leftInput" type="number" step="1"></label>
              <label>Bottom <input id="bottomInput" type="number" step="1"></label>
              <label>Right <input id="rightInput" type="number" step="1"></label>
              <label>Top <input id="topInput" type="number" step="1"></label>
            </div>
            <div class="button-row" style="margin-top: 0.75rem;">
              <button id="applyBoxButton" class="primary" type="button" disabled>Apply box</button>
              <button id="reloadBoxButton" type="button" disabled>Reload values</button>
            </div>
          </section>

          <section class="panel">
            <h2>Page Size</h2>
            <div class="grid-2">
              <label>Width <input id="widthInput" type="number" step="1" min="1"></label>
              <label>Height <input id="heightInput" type="number" step="1" min="1"></label>
            </div>
            <div class="button-row" style="margin-top: 0.75rem;">
              <button id="applySizeButton" class="primary" type="button" disabled>Apply size</button>
            </div>
          </section>
        </aside>

        <section class="viewer">
          <div class="canvas-frame">
            <div class="empty" id="emptyState">
              <h2>No document loaded</h2>
              <p>Select a PDF to inspect media, crop, bleed, trim, and art boxes.</p>
            </div>
            <div id="pageStack" class="page-stack" hidden>
              <canvas id="pageCanvas"></canvas>
              <div id="overlay" class="overlay"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module">
      import { createPdfiumApi } from "../../pdfium-api.js";

      const RENDER_ANNOTATIONS = 0x01;
      const BOXES = [
        { type: 0, key: "media", label: "Media", color: "#2563eb" },
        { type: 1, key: "crop", label: "Crop", color: "#16a34a" },
        { type: 2, key: "bleed", label: "Bleed", color: "#ea580c" },
        { type: 3, key: "trim", label: "Trim", color: "#9333ea" },
        { type: 4, key: "art", label: "Art", color: "#be123c" },
      ];

      const state = {
        api: null,
        doc: null,
        fileName: "",
        pageIndex: 0,
        pageCount: 0,
        pageSize: null,
        renderSize: null,
        boxes: new Map(),
        zoom: 0.85,
        rendering: false,
        dirty: false,
      };

      const elements = {
        pdfInput: document.getElementById("pdfInput"),
        prevButton: document.getElementById("prevButton"),
        nextButton: document.getElementById("nextButton"),
        zoomOutButton: document.getElementById("zoomOutButton"),
        zoomResetButton: document.getElementById("zoomResetButton"),
        zoomInButton: document.getElementById("zoomInButton"),
        saveButton: document.getElementById("saveButton"),
        boxSelect: document.getElementById("boxSelect"),
        showAllBoxes: document.getElementById("showAllBoxes"),
        applyBoxButton: document.getElementById("applyBoxButton"),
        reloadBoxButton: document.getElementById("reloadBoxButton"),
        applySizeButton: document.getElementById("applySizeButton"),
        leftInput: document.getElementById("leftInput"),
        bottomInput: document.getElementById("bottomInput"),
        rightInput: document.getElementById("rightInput"),
        topInput: document.getElementById("topInput"),
        widthInput: document.getElementById("widthInput"),
        heightInput: document.getElementById("heightInput"),
        status: document.getElementById("status"),
        fileName: document.getElementById("fileName"),
        pageInfo: document.getElementById("pageInfo"),
        pageSize: document.getElementById("pageSize"),
        zoomInfo: document.getElementById("zoomInfo"),
        boxList: document.getElementById("boxList"),
        emptyState: document.getElementById("emptyState"),
        pageStack: document.getElementById("pageStack"),
        canvas: document.getElementById("pageCanvas"),
        overlay: document.getElementById("overlay"),
      };

      function setStatus(message, isError = false) {
        elements.status.textContent = message;
        elements.status.classList.toggle("error", isError);
      }

      function updateControls() {
        const hasDocument = Boolean(state.doc);
        elements.prevButton.disabled = !hasDocument || state.rendering || state.pageIndex <= 0;
        elements.nextButton.disabled = !hasDocument || state.rendering || state.pageIndex >= state.pageCount - 1;
        elements.zoomOutButton.disabled = !hasDocument || state.rendering || state.zoom <= 0.35;
        elements.zoomResetButton.disabled = !hasDocument || state.rendering || state.zoom === 0.85;
        elements.zoomInButton.disabled = !hasDocument || state.rendering || state.zoom >= 3;
        elements.saveButton.disabled = !hasDocument || state.rendering || !state.dirty;
        elements.applyBoxButton.disabled = !hasDocument || state.rendering;
        elements.reloadBoxButton.disabled = !hasDocument || state.rendering;
        elements.applySizeButton.disabled = !hasDocument || state.rendering;
      }

      async function getApi() {
        if (!state.api) {
          state.api = await createPdfiumApi({ locateFile: (file) => new URL(`../../dist/${file}`, import.meta.url).href });
        }
        return state.api;
      }

      function closeCurrentDocument() {
        if (state.doc) state.doc.close();
        state.doc = null;
      }

      function selectedBox() {
        return BOXES.find((box) => box.type === Number(elements.boxSelect.value)) || BOXES[0];
      }

      function currentBoxValues() {
        return {
          left: Number(elements.leftInput.value),
          bottom: Number(elements.bottomInput.value),
          right: Number(elements.rightInput.value),
          top: Number(elements.topInput.value),
        };
      }

      function formatRect(rect) {
        return `L ${rect.left.toFixed(1)}, B ${rect.bottom.toFixed(1)}, R ${rect.right.toFixed(1)}, T ${rect.top.toFixed(1)}`;
      }

      function drawRgbaToCanvas(rgbaBytes, width, height) {
        elements.canvas.width = width;
        elements.canvas.height = height;
        elements.canvas.style.width = `${width}px`;
        elements.canvas.style.height = `${height}px`;
        elements.overlay.style.width = `${width}px`;
        elements.overlay.style.height = `${height}px`;
        elements.canvas.getContext("2d").putImageData(new ImageData(new Uint8ClampedArray(rgbaBytes), width, height), 0, 0);
      }

      function pdfRectToCanvasRect(rect) {
        const scaleX = state.renderSize.width / state.pageSize.width;
        const scaleY = state.renderSize.height / state.pageSize.height;
        return {
          left: rect.left * scaleX,
          top: (state.pageSize.height - rect.top) * scaleY,
          width: (rect.right - rect.left) * scaleX,
          height: (rect.top - rect.bottom) * scaleY,
        };
      }

      function readBoxes() {
        state.boxes.clear();
        for (const box of BOXES) {
          state.boxes.set(box.type, state.doc.pageBox(state.pageIndex, box.type));
        }
      }

      function renderBoxList() {
        elements.boxList.replaceChildren();
        for (const box of BOXES) {
          const rect = state.boxes.get(box.type);
          const row = document.createElement("div");
          row.className = "box-row";
          const label = document.createElement("span");
          label.textContent = box.label;
          label.style.color = box.color;
          const value = document.createElement("code");
          value.textContent = rect ? formatRect(rect) : "Unavailable";
          row.append(label, value);
          elements.boxList.append(row);
        }
      }

      function renderOverlays() {
        elements.overlay.replaceChildren();
        const selected = selectedBox();
        const visibleBoxes = elements.showAllBoxes.checked ? BOXES : [selected];
        for (const box of visibleBoxes) {
          const rect = state.boxes.get(box.type);
          if (!rect) continue;
          const canvasRect = pdfRectToCanvasRect(rect);
          const node = document.createElement("div");
          node.className = `box-rect${box.type === selected.type ? " selected" : ""}`;
          node.style.setProperty("--box-color", box.color);
          node.style.left = `${canvasRect.left}px`;
          node.style.top = `${canvasRect.top}px`;
          node.style.width = `${Math.max(1, canvasRect.width)}px`;
          node.style.height = `${Math.max(1, canvasRect.height)}px`;
          elements.overlay.append(node);
        }
      }

      function loadSelectedBoxIntoInputs() {
        const rect = state.boxes.get(selectedBox().type);
        if (!rect) return;
        elements.leftInput.value = rect.left.toFixed(1);
        elements.bottomInput.value = rect.bottom.toFixed(1);
        elements.rightInput.value = rect.right.toFixed(1);
        elements.topInput.value = rect.top.toFixed(1);
      }

      async function renderCurrentPage() {
        if (!state.doc || state.rendering) return;
        state.rendering = true;
        updateControls();
        try {
          state.pageCount = state.doc.pageCount();
          if (state.pageIndex >= state.pageCount) state.pageIndex = state.pageCount - 1;
          state.pageSize = state.doc.pageSize(state.pageIndex);
          const width = Math.max(1, Math.round(state.pageSize.width * state.zoom));
          const height = Math.max(1, Math.round(state.pageSize.height * state.zoom));
          state.renderSize = { width, height };
          const rendered = state.doc.renderPage({ pageIndex: state.pageIndex, width, height, flags: RENDER_ANNOTATIONS });
          drawRgbaToCanvas(rendered.rgbaBytes, width, height);
          readBoxes();
          renderBoxList();
          loadSelectedBoxIntoInputs();
          renderOverlays();
          elements.emptyState.hidden = true;
          elements.pageStack.hidden = false;
          elements.fileName.textContent = state.fileName || "Loaded PDF";
          elements.pageInfo.textContent = `${state.pageIndex + 1} / ${state.pageCount}`;
          elements.pageSize.textContent = `${state.pageSize.width.toFixed(1)} x ${state.pageSize.height.toFixed(1)} pt`;
          elements.zoomInfo.textContent = `${Math.round(state.zoom * 100)}%`;
          elements.widthInput.value = state.pageSize.width.toFixed(1);
          elements.heightInput.value = state.pageSize.height.toFixed(1);
          setStatus("Rendered page geometry.");
        } catch (error) {
          console.error(error);
          setStatus(error instanceof Error ? error.message : "Unable to render page geometry.", true);
        } finally {
          state.rendering = false;
          updateControls();
        }
      }

      async function loadPdf(file) {
        closeCurrentDocument();
        state.fileName = file.name;
        state.pageIndex = 0;
        state.pageCount = 0;
        state.zoom = 0.85;
        state.dirty = false;
        elements.pageStack.hidden = true;
        elements.emptyState.hidden = false;
        updateControls();
        setStatus("Opening PDF...");
        try {
          const bytes = new Uint8Array(await file.arrayBuffer());
          const api = await getApi();
          state.doc = api.openDocument(bytes);
          await renderCurrentPage();
        } catch (error) {
          closeCurrentDocument();
          console.error(error);
          setStatus(error instanceof Error ? error.message : "Unable to open PDF.", true);
        }
      }

      async function mutate(message, callback) {
        try {
          callback();
          state.dirty = true;
          await renderCurrentPage();
          setStatus(message);
        } catch (error) {
          console.error(error);
          setStatus(error instanceof Error ? error.message : "Geometry update failed.", true);
          updateControls();
        }
      }

      function savePdf() {
        try {
          const output = state.doc.save();
          const base = state.fileName.replace(/\.pdf$/i, "") || "geometry";
          const blob = new Blob([output], { type: "application/pdf" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${base}-geometry.pdf`;
          link.click();
          URL.revokeObjectURL(url);
          state.dirty = false;
          updateControls();
          setStatus("Saved modified PDF.");
        } catch (error) {
          console.error(error);
          setStatus(error instanceof Error ? error.message : "Unable to save PDF.", true);
        }
      }

      for (const box of BOXES) {
        const option = document.createElement("option");
        option.value = String(box.type);
        option.textContent = box.label;
        elements.boxSelect.append(option);
      }


      async function loadDemoPdf() {
        try {
          setStatus("Loading demo.pdf...");
          const response = await fetch("../demo.pdf");
          if (!response.ok) throw new Error(`Unable to fetch demo.pdf (${response.status})`);
          const blob = await response.blob();
          const file = new File([blob], "demo.pdf", { type: "application/pdf" });
          await loadPdf(file);
        } catch (error) {
          console.warn(error);
          setStatus("Demo PDF could not be loaded. Choose a PDF file manually.", true);
        }
      }

      elements.pdfInput.addEventListener("change", async () => { const [file] = elements.pdfInput.files; if (file) await loadPdf(file); });
      elements.prevButton.addEventListener("click", async () => { if (state.pageIndex > 0) { state.pageIndex -= 1; await renderCurrentPage(); } });
      elements.nextButton.addEventListener("click", async () => { if (state.pageIndex < state.pageCount - 1) { state.pageIndex += 1; await renderCurrentPage(); } });
      elements.zoomOutButton.addEventListener("click", async () => { state.zoom = Math.max(0.25, Number((state.zoom - 0.25).toFixed(2))); await renderCurrentPage(); });
      elements.zoomResetButton.addEventListener("click", async () => { state.zoom = 0.85; await renderCurrentPage(); });
      elements.zoomInButton.addEventListener("click", async () => { state.zoom = Math.min(3, Number((state.zoom + 0.25).toFixed(2))); await renderCurrentPage(); });
      elements.boxSelect.addEventListener("change", () => { loadSelectedBoxIntoInputs(); renderOverlays(); });
      elements.showAllBoxes.addEventListener("change", renderOverlays);
      elements.reloadBoxButton.addEventListener("click", loadSelectedBoxIntoInputs);
      elements.applyBoxButton.addEventListener("click", () => mutate(`${selectedBox().label} box updated.`, () => state.doc.setPageBox(state.pageIndex, selectedBox().type, currentBoxValues())));
      elements.applySizeButton.addEventListener("click", () => mutate("Page size updated.", () => state.doc.setPageSize(state.pageIndex, Number(elements.widthInput.value), Number(elements.heightInput.value))));
      elements.saveButton.addEventListener("click", savePdf);
      window.addEventListener("beforeunload", () => { closeCurrentDocument(); if (state.api) state.api.destroy(); });

      updateControls();
      loadDemoPdf();
    </script>
  </body>
</html>
